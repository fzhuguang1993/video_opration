name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 pymysql requests smbprotocol pypinyin

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "MovieOperation" `
            --add-data "config.py;." `
            --add-data "tool_config.json;." `
            --add-data "ffmpeg/ffmpeg.exe;ffmpeg" `
            --hidden-import PySide6.QtCore `
            --hidden-import PySide6.QtWidgets `
            --hidden-import PySide6.QtGui `
            --hidden-import pymysql `
            --hidden-import requests `
            --hidden-import smbprotocol `
            --hidden-import pypinyin `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieOperation
          path: dist/MovieOperation.exe
