name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller PyQt5

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "VideoWatermark" --hidden-import PyQt5.QAxContainer video_watermark.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoWatermark
          path: dist/VideoWatermark.exe