name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 pymysql requests smbprotocol pypinyin pandas pyautogui numpy

      - name: Download FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "ffmpeg" -Force
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp" -Force
          $ffmpegDir = (Get-ChildItem -Path "ffmpeg_temp" -Directory)[0].FullName
          Copy-Item -Path "$ffmpegDir\bin\ffmpeg.exe" -Destination "ffmpeg\"

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "MovieOperation" `
            --add-data "config.py;." `
            --add-data "tool_config.json;." `
            --add-data "ffmpeg\ffmpeg.exe;ffmpeg" `
            --hidden-import PySide6.QtCore `
            --hidden-import PySide6.QtWidgets `
            --hidden-import PySide6.QtGui `
            --hidden-import pymysql `
            --hidden-import requests `
            --hidden-import smbprotocol `
            --hidden-import pypinyin `
            --hidden-import pandas `
            --hidden-import numpy `
            --hidden-import pyautogui `
            --collect-all pyautogui `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieOperation
          path: dist/MovieOperation.exe
